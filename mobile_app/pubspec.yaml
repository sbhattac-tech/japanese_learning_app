name: japanese_learning_app
description: Flutter client for the Cognita backend.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.1
  http_parser: ^4.1.2
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.15.0
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/hiragana.json
    - assets/data/katakana.json
    - assets/data/kanji.json
